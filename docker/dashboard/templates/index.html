<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Twin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <style>
    body {
      background-color: #f8f9fa;
    }
    .card h2 {
      font-size: 3rem;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <h1 class="text-center mb-4">🚀 Digital Twin Dashboard</h1>

    <div class="row g-4">
      <!-- Temperature Card -->
      <div class="col-md-4">
        <div class="card text-center shadow-sm">
          <div class="card-header bg-primary text-white">
            Current Temperature
          </div>
          <div class="card-body">
            <h2 id="temperature">--</h2>
            <p class="text-muted mb-0">°C</p>
          </div>
        </div>
      </div>

      <!-- Last Updated Card -->
      <div class="col-md-4">
        <div class="card text-center shadow-sm">
          <div class="card-header bg-info text-white">
            Last Updated
          </div>
          <div class="card-body">
            <p id="timestamp" class="fs-4 mb-0">--:--:--</p>
          </div>
        </div>
      </div>

      <!-- Status Card -->
      <div class="col-md-4">
        <div class="card text-center shadow-sm">
          <div class="card-header bg-dark text-white">
            Connection Status
          </div>
          <div class="card-body">
            <span id="status" class="badge bg-secondary fs-5">Disconnected</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Socket.IO -->
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script>
    const socket = io();

    socket.on("connect", () => {
      document.getElementById("status").innerText = "Connected";
      document.getElementById("status").className = "badge bg-success fs-5";
    });

    socket.on("disconnect", () => {
      document.getElementById("status").innerText = "Disconnected";
      document.getElementById("status").className = "badge bg-danger fs-5";
    });

    socket.on("temperature_update", (data) => {
      const now = new Date().toLocaleTimeString();
      document.getElementById("temperature").innerText = data.value;
      document.getElementById("timestamp").innerText = now;
    });
  </script>
</body>
</html>
